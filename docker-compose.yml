services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./contracts:/contracts:ro
      - ./data:/data
      # Signal manifest + mock_pipeline live here; the backend resolves its manifest
      # at ../tools/fixtures/… (→ /tools) and you can run the mock pipeline in-container.
      - ./tools:/tools:ro
    environment:
      - VCORE_CONFIG=/app/config.yaml
      # LSL resolves streams over loopback unicast (multicast doesn't work in a container).
      - LSLAPICFG=/app/lsl_api.cfg
      # LiveKit endpoints/secrets (override config.yaml). In-network API URL for the
      # backend; the client-facing URL handed out in tokens points at the host.
      - LIVEKIT_API_URL=http://livekit:7880
      - LIVEKIT_URL=ws://localhost:7880
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=devsecretdevsecretdevsecretdevsecret12
    command: uvicorn vcore.app:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - livekit

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    environment:
      # In Docker the dev-server proxies /api and /ws to the backend *service*,
      # not localhost (which would be the frontend container itself).
      - VITE_PROXY_TARGET=http://backend:8000
    command: npm run dev -- --host
    depends_on:
      - backend

  # ── Media plane (LiveKit SFU + Egress) ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880"     # signaling + server API
      - "7881:7881"     # RTC over TCP
      - "7882:7882/udp" # RTC media (single UDP port; avoids the Windows-reserved 50000+ range)
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit.yaml:ro
    depends_on:
      - redis

  egress:
    image: livekit/egress:latest
    environment:
      - EGRESS_CONFIG_FILE=/etc/egress.yaml
    volumes:
      - ./livekit/egress.yaml:/etc/egress.yaml:ro
      # Egress writes .webm files here; same host dir the backend serves from (backend/data/video).
      - ./backend/data/video:/out
    # Room-composite egress runs headless Chrome, which needs this.
    cap_add:
      - SYS_ADMIN
    depends_on:
      - redis
      - livekit
