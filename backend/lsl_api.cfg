# LSL runtime config (pointed to by $LSLAPICFG).
#
# Inside a Docker container, multicast stream discovery doesn't work (the loopback
# interface isn't multicast-capable and the bridge filters it). Listing 127.0.0.1 as a
# known peer makes LSL resolve streams over loopback *unicast* instead, so the backend
# inlet finds an outlet (e.g. mock_pipeline) running in the same container.
[lab]
KnownPeers = {127.0.0.1}
