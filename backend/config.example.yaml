# V-CORE configuration template.
#
# Copy to config.yaml and adjust for your deployment. The app reads config.yaml
# (or $VCORE_CONFIG) at startup; if absent, the defaults in vcore/core/config.py
# apply (which match the values below).
#
# Relative paths resolve against the backend/ directory (where this file lives),
# so they work regardless of the working directory you launch from.
# Each key is tagged (wired) = consumed by app.py, or (reference only) = documents
# intent but not yet read.

# ── Ingestion (signal pipeline — Machine C) ──────────────────────────────────
ingestion:
  # (wired) LSL stream name(s); the first is the primary stream to resolve.
  lsl_streams:
    - sensor.cognitive
  # (wired) Contract-1 signal manifest (sidecar JSON) for the stream's channels.
  manifest_path: ../tools/fixtures/full_session.manifest.json
  # (wired) Seconds without a sample before the signal is marked stale.
  stale_timeout_s: 5
  # (reference only) Offline replay fixture — ReplaySource is test-only.
  # replay_fixture: tools/fixtures/sample_session.csv

# ── Outbound (Unity runtime — Machine B) ─────────────────────────────────────
outbound:
  # (reference only) Only 'ws' is implemented; 'zmq' is a documented stub.
  transport: ws
  # (wired) Standalone WsSink server bind, used by mock_unity / direct clients.
  # The real Unity POC instead connects to /ws/runtime on the main bridge port.
  ws_host: localhost
  ws_port: 9001

# ── WebSocket bridge (V-CORE server — Machine A) ──────────────────────────────
bridge:
  # (wired via `python -m vcore.app`) Interface and port to bind.
  # Use 0.0.0.0 for LAN; 127.0.0.1 for single-machine dev.
  # NB: `uvicorn vcore.app:app` ignores these — pass --host/--port on the CLI.
  host: 0.0.0.0
  port: 8000
  # (reference only) Auth is not implemented yet.
  # bearer_token: "change-me-before-use"

# ── Recording (fully granular — each path independently configurable) ─────────
recording:
  # (wired) Write raw LSL streams to XDF per session.
  xdf_enabled: true
  # (wired) Dir for per-session XDF files → backend/data/xdf/<session_id>.xdf.
  xdf_dir: data/xdf
  # (wired) Dir for per-session video files → backend/data/video/<session_id>.<ext>.
  video_dir: data/video
  # (wired) SQLite database file (name is configurable) → backend/data/vcore.db.
  sqlite_path: data/vcore.db

# ── Rule files ────────────────────────────────────────────────────────────────
rules:
  # (wired) Directory watched for YAML/JSON rule files → backend/rules.
  rules_dir: rules

# ── LiveKit (media plane — SFU + Egress recording) ────────────────────────────
livekit:
  # (wired) Master switch. Keep false until the LiveKit frontend + Unity clients exist.
  enabled: false
  # (wired) Client-facing URL handed out in tokens (browser/Unity dial this).
  url: ws://localhost:7880
  # (wired) Backend → LiveKit server API (docker-compose env overrides to http://livekit:7880).
  api_url: http://localhost:7880
  # (wired) Dev key/secret — override via env LIVEKIT_API_KEY / LIVEKIT_API_SECRET.
  api_key: devkey
  api_secret: devsecretdevsecretdevsecretdevsecret12
  # (wired) Fixed room everyone shares (always-on live mirror).
  room: vcore
  # (wired) Egress container's output dir; maps to recording.video_dir on the host.
  egress_out_dir: /out
