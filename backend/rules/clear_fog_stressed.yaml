id: clear-fog-stressed
schema_version: "1.0.0"
description: "Reduce visual clutter when the participant is stressed (negative valence, high arousal)"
enabled: true
when:
  all:
    - signal: emotion
      op: "=="
      value: "Negative / High arousal"
      sustain_s: 3
then:
  set:
    target:
      tag: fog
    status: density
    value: low
  cooldown_s: 20
