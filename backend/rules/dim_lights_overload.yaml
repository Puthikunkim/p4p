id: dim-lights-overload
schema_version: "1.0.0"
description: "Dim lights on sustained high cognitive load"
enabled: true
when:
  all:
    - signal: cognitive_load
      op: ">="
      threshold: 0.75
      sustain_s: 5
then:
  set:
    target:
      tag: ambient_light
    status: brightness
    value: 20
  cooldown_s: 30
