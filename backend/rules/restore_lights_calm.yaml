id: restore-lights-calm
schema_version: "1.0.0"
description: "Restore lights when cognitive load returns to baseline"
enabled: true
when:
  all:
    - signal: cognitive_load
      op: "=="
      value: "Low"
      sustain_s: 8
then:
  set:
    target:
      tag: ambient_light
    status: brightness
    value: 80
  cooldown_s: 45
